  name: Spring Docker Build & Push
  on:
    push:
      branches: [ prod ]
  jobs:
    build-and-push:
      runs-on: ubuntu-latest
      steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'  # AdoptOpenJDK/Temurin 사용 예시
      - name: Mvn Package
        run: mvn clean package -B -DskipTests
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USER }}" --password-stdin
      - name: Build Docker image
        run: docker build -t xxx0209/spring-backend:latest .
      - name: Push Docker image
        run: docker push xxx0209/spring-backend:latest

        # VM1 배포스크립트 실행행 (SSH)
      - name: Deploy to VM
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_VM1_HOST }}
          username: ${{ secrets.EC2_VM1_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            bash /home/ubuntu/deployment/scripts/deploy_env.sh
