server:
  port: 8081

# 운영 환경: CORS_ALLOWED_ORIGIN 환경변수 또는 아래 URL로 설정 (쉼표로 여러 개 가능)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGIN:http://43.202.121.6}

# 운영: AI 서비스 URL (AI_SERVICE_URL 환경변수 또는 아래 기본값)
ai:
  base-url: ${AI_SERVICE_URL:http://43.202.121.6}

spring:
  datasource:
    url: jdbc:mysql://43.202.121.6:3306/matjip?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: mysql
    driver-class-name: com.mysql.cj.jdbc.Driver
    database-platform: org.hibernate.dialect.MySQL8Dialect #사용할 DB 종류와 버전

  jpa:
    hibernate:
      ddl-auto: update           # 테이블 구조 검증만, 수정하지 않음
    properties:
      hibernate:
        show_sql: false            # SQL 출력 X
        format_sql: false
    defer-datasource-initialization: false

  sql:
    init:
      mode: never                   # 초기화 안 함

  devtools:
    restart:
      enabled: false                # DevTools 비활성화
    livereload:
      enabled: false                # LiveReload 비활성화

logging:
  level:
    root: info #기본 로그 레벨
    org.hibernate.SQL: warn #운영에선 경고만
    org.hibernate.type.descriptor.sql: warn #운영에선 경고만
